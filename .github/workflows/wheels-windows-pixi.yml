name: Build & Test (Windows pixi)

# Experimental alternative to wheels-windows.yml using pixi for deps
# (conda-forge under the hood) — same shape as wheels-linux.yml /
# wheels-macos.yml. Dispatched manually for now. If stable, replaces
# wheels-windows.yml.

on:
  # During pixi evaluation, trigger on this branch + dispatch. Once promoted
  # to canonical (replacing wheels-windows.yml), broaden to main + tags + PRs.
  push:
    branches:
      - 'gh-40-windows-build'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/wheels-linux.yml'
      - '.github/workflows/wheels-macos.yml'
      - '.github/workflows/wheels-windows.yml'
      - '.github/workflows/vcpkg_triplets/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false  # don't kill siblings on transient network failures
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        shell: bash -el {0}  # Git Bash is pre-installed on windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        path: ws/src/tesseract_nanobind
        fetch-depth: 0  # setuptools-scm tag history

    - name: enable long paths
      shell: pwsh
      run: git config --global core.longpaths true

    - name: setup pixi
      uses: prefix-dev/setup-pixi@v0.8.0
      env:
        PIXI_ENV: py${{ matrix.python == '3.9' && '39' || matrix.python == '3.10' && '310' || matrix.python == '3.11' && '311' || '312' }}
      with:
        manifest-path: ws/src/tesseract_nanobind/pyproject.toml
        cache: true
        environments: ${{ env.PIXI_ENV }}
        activate-environment: ${{ env.PIXI_ENV }}

    - name: activate MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        toolset: "14.4"  # v143

    - name: pip build tools
      run: python -m pip install --upgrade pip delvewheel

    - name: cache vcs repos
      uses: actions/cache@v4
      with:
        path: |
          ws/src/tesseract
          ws/src/tesseract_planning
          ws/src/trajopt
          ws/src/descartes_light
          ws/src/opw_kinematics
          ws/src/ifopt
          ws/src/ruckig
          ws/src/boost_plugin_loader
          ws/src/ros_industrial_cmake_boilerplate
        key: vcs-win-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall') }}

    - name: vcs import
      working-directory: ws/src
      run: vcs import --input tesseract_nanobind/dependencies.rosinstall --skip-existing

    - name: patch upstream missing includes
      working-directory: ws/src
      run: |
        # MSVC is strict about transitive stdlib includes. GCC/Clang pull in
        # <cassert>/<stdexcept> via libstdc++ headers; MSVC does not. Scan the
        # whole set of upstream source trees colcon will build, not just ifopt.
        add_include() {
          local file=$1 header=$2 tag=$3
          grep -qE "#include[[:space:]]*<${header//./\\.}>" "$file" && return
          local last
          last=$(grep -n '^#include' "$file" | tail -1 | cut -d: -f1)
          [ -z "$last" ] && return
          { head -n "$last" "$file"; echo "#include <${header}>"; tail -n "+$((last + 1))" "$file"; } > "$file.new"
          mv "$file.new" "$file"
          echo "  patched ${tag}: $file"
        }

        # Source trees that colcon will build and that may have MSVC-strict issues.
        TREES="tesseract tesseract_planning trajopt ifopt opw_kinematics"

        # assert() needs <cassert>
        for tree in $TREES; do
          [ -d "$tree" ] || continue
          while IFS= read -r f; do
            add_include "$f" cassert cassert
          done < <(find "$tree" \( -name '*.h' -o -name '*.hpp' -o -name '*.cc' -o -name '*.cpp' \) -exec grep -l 'assert(' {} + 2>/dev/null)
        done

        # std::runtime_error, std::logic_error, etc. need <stdexcept>
        for tree in $TREES; do
          [ -d "$tree" ] || continue
          while IFS= read -r f; do
            add_include "$f" stdexcept stdexcept
          done < <(find "$tree" \( -name '*.h' -o -name '*.hpp' -o -name '*.cc' -o -name '*.cpp' \) -exec grep -l -E 'std::(runtime_error|logic_error|invalid_argument|out_of_range|domain_error|length_error|overflow_error)' {} + 2>/dev/null)
        done

        # opw_kinematics: add_executable(${PROJECT_NAME}_node src/test.cpp) is
        # outside its OPW_ENABLE_TESTING guard. On MSVC+conda-forge Eigen the
        # INTERFACE include from Eigen3::Eigen doesn't propagate to the test
        # target, so it fails to find "Eigen/Dense". Short-circuit it.
        F=opw_kinematics/CMakeLists.txt
        if [ -f "$F" ] && grep -q '^# Create test executable' "$F"; then
          sed -i '/^# Create test executable/i if(FALSE)  # patched: skip stray test exe' "$F"
          sed -i '/^# Install/i endif()  # patched: close if(FALSE)' "$F"
          echo "  patched: $F (skipped opw_kinematics_node test exe)"
        fi

    # Split restore+save so colcon output persists even if a later step
    # (wheel build, delvewheel) fails — same reason as vcpkg cache split.
    - name: restore colcon cache
      id: colcon-cache
      uses: actions/cache/restore@v4
      with:
        path: ws/install
        key: colcon-win-pixi-py${{ matrix.python }}-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall', 'ws/src/tesseract_nanobind/pyproject.toml') }}

    - name: colcon build C++ deps
      if: steps.colcon-cache.outputs.cache-hit != 'true'
      working-directory: ws
      env:
        # /bigobj — tesseract_common cereal serialization exceeds COFF section limit
        # EIGEN_DONT_ALIGN/VECTORIZE — MSVC ABI boundaries don't respect Eigen alignment
        CXXFLAGS: "-DEIGEN_DONT_ALIGN=1 -DEIGEN_DONT_VECTORIZE=1 /bigobj"
      run: |
        # conda-forge Windows binaries live under $CONDA_PREFIX/Library (not $CONDA_PREFIX)
        CONDA_LIB="$CONDA_PREFIX/Library"
        export CMAKE_PREFIX_PATH="$CONDA_LIB;$GITHUB_WORKSPACE/ws/install"
        export PATH="$CONDA_LIB/bin:$PATH"
        # MSVC link.exe library search path. Needed because some upstream
        # CMakeLists (e.g. tesseract common) link libs by bare name
        # (yaml-cpp) instead of namespaced target (yaml-cpp::yaml-cpp);
        # conda-forge only populates the namespaced form, so the bare name
        # falls through to linker's search path.
        export LIB="$CONDA_LIB/lib;${LIB:-}"
        colcon build --merge-install \
          --packages-ignore tesseract_python tesseract_examples vhacd qpoases tesseract_nanobind tesseract_viewer_python twc_workcell_positioner_viewer \
          --event-handlers console_cohesion+ \
          --cmake-force-configure \
          --cmake-args -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_VISIBILITY_PRESET=default -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DINSTALL_OMPL=OFF -DBUILD_CLOUD_CLIENT=OFF -DBUILD_IPOPT=OFF -DBUILD_SNOPT=OFF \
            -DBUILD_SHARED_LIBS=ON -DTESSERACT_ENABLE_EXAMPLES=OFF -DTESSERACT_BUILD_TRAJOPT_IFOPT=ON \
            -DTESSERACT_ENABLE_TESTING=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DNO_OPENCL=ON

    - name: save colcon cache
      # Runs after colcon build succeeds, before wheel build. If wheel build
      # later fails, cache is already saved so next iteration skips colcon.
      if: steps.colcon-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ws/install
        key: colcon-win-pixi-py${{ matrix.python }}-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall', 'ws/src/tesseract_nanobind/pyproject.toml') }}

    - name: patch exported cmake configs for windows linking
      # tesseract (and friends) export CMake targets with INTERFACE_LINK_LIBRARIES
      # containing bare "yaml-cpp" instead of the namespaced "yaml-cpp::yaml-cpp"
      # target that conda-forge exports. On Windows this causes downstream
      # consumers (our nanobind bindings) to fail linking with LNK1181. Patch
      # the exported .cmake configs in-place to use the namespaced target.
      # Runs after both cache restore AND fresh colcon build so the patched
      # configs are always present for the wheel build step below.
      working-directory: ws/install
      run: |
        find . -name '*.cmake' -type f | while read f; do
          # Replace bare "yaml-cpp" in ;-delimited list contexts (standard form
          # of INTERFACE_LINK_LIBRARIES values in exported configs).
          if grep -q '[";]yaml-cpp[";]' "$f" 2>/dev/null; then
            sed -i -E 's/(["\;])yaml-cpp(["\;])/\1yaml-cpp::yaml-cpp\2/g' "$f"
            echo "  patched: $f"
          fi
        done

    - name: build nanobind wheel
      working-directory: ws/src/tesseract_nanobind
      env:
        CXXFLAGS: "-DEIGEN_DONT_ALIGN=1 -DEIGEN_DONT_VECTORIZE=1 /bigobj"
      run: |
        CONDA_LIB="$CONDA_PREFIX/Library"
        export CMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/ws/install;$CONDA_LIB"
        export PATH="$GITHUB_WORKSPACE/ws/install/bin:$CONDA_LIB/bin:$PATH"

        # tesseract_common's exported CMake config has INTERFACE_LINK_LIBRARIES
        # "yaml-cpp" (bare name, not yaml-cpp::yaml-cpp target). CMake passes
        # bare "yaml-cpp" to MSBuild which turns it into yaml-cpp.lib on the
        # linker's library search path. MSBuild's default search path does NOT
        # include conda's Library/lib, so the lib isn't found. Inject the
        # conda lib dir via CMAKE_{EXE,SHARED}_LINKER_FLAGS so MSBuild bakes
        # /LIBPATH:... into every vcxproj it generates. Paths must be Windows-
        # style for MSVC link.exe.
        WIN_CONDA_LIB=$(cygpath -w "$CONDA_LIB/lib")
        WIN_INSTALL_LIB=$(cygpath -w "$GITHUB_WORKSPACE/ws/install/lib")
        LIBPATH_FLAGS="/LIBPATH:${WIN_CONDA_LIB} /LIBPATH:${WIN_INSTALL_LIB}"
        export CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_SHARED_LINKER_FLAGS=${LIBPATH_FLAGS} -DCMAKE_EXE_LINKER_FLAGS=${LIBPATH_FLAGS} -DCMAKE_MODULE_LINKER_FLAGS=${LIBPATH_FLAGS}"
        pip wheel . -w dist/ --no-build-isolation

    - name: bundle plugins then delvewheel repair
      working-directory: ws/src/tesseract_nanobind
      run: |
        set -e
        WHEEL_FILE=$(ls dist/tesseract*.whl)
        WHEEL_DIR=$(mktemp -d)
        unzip -q "$WHEEL_FILE" -d "$WHEEL_DIR"
        PKG_DIR="$WHEEL_DIR/tesseract_robotics"

        echo "=== Bundling plugin factory DLLs into package dir ==="
        for plugin in \
          tesseract_collision_bullet_factories \
          tesseract_collision_fcl_factories \
          tesseract_kinematics_core_factories \
          tesseract_kinematics_kdl_factories \
          tesseract_kinematics_opw_factory \
          tesseract_kinematics_ur_factory \
          tesseract_task_composer_factories \
          tesseract_task_composer_planning_factories \
          tesseract_task_composer_taskflow_factories; do
          src="$GITHUB_WORKSPACE/ws/install/bin/${plugin}.dll"
          [ -f "$src" ] && cp "$src" "$PKG_DIR/" && echo "  Added: ${plugin}.dll" || echo "  MISSING: ${plugin}.dll"
        done

        echo "=== Patching task_composer_config YAMLs ==="
        for yaml_file in "$PKG_DIR/data/task_composer_config"/*.yaml; do
          if [[ -f "$yaml_file" ]] && grep -q '/usr/local/lib' "$yaml_file"; then
            sed -i 's|/usr/local/lib|"@PLUGIN_PATH@"|g' "$yaml_file"
            echo "  Patched: $(basename "$yaml_file")"
          fi
        done

        echo "=== Stripping search_paths from tesseract_support YAMLs ==="
        find "$PKG_DIR/data/tesseract_support" -name "*.yaml" -type f 2>/dev/null | while read yaml_file; do
          if grep -q 'search_paths:' "$yaml_file"; then
            sed -i '/search_paths:/d; /^[[:space:]]*- \/.*$/d' "$yaml_file"
            echo "  Stripped: $(basename "$yaml_file")"
          fi
        done

        rm "$WHEEL_FILE"
        (cd "$WHEEL_DIR" && zip -rq "$GITHUB_WORKSPACE/ws/src/tesseract_nanobind/$WHEEL_FILE" .)
        rm -rf "$WHEEL_DIR"

        echo "=== delvewheel repair ==="
        mkdir -p wheelhouse
        CONDA_BIN="$CONDA_PREFIX/Library/bin"
        INSTALL_BIN="$GITHUB_WORKSPACE/ws/install/bin"
        delvewheel repair -v --add-path "$INSTALL_BIN;$CONDA_BIN" -w wheelhouse "$WHEEL_FILE"

        echo "=== Wheel contents ==="
        ls -la wheelhouse/

    - uses: actions/upload-artifact@v4
      with:
        name: python-${{ matrix.python }}-windows-x64-pixi
        path: ws/src/tesseract_nanobind/wheelhouse/tesseract*.whl

    - if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows-x64-pixi-py${{ matrix.python }}
        path: '**/*.log'
        retention-days: 2

  test-wheel:
    needs: build
    runs-on: windows-2022
    continue-on-error: ${{ matrix.python == '3.9' }}
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.12']
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v4
      with:
        path: tesseract_nanobind
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        architecture: x64
    - uses: actions/download-artifact@v4
      with:
        name: python-${{ matrix.python }}-windows-x64-pixi
        path: wheelhouse

    - name: install wheel in clean venv
      run: |
        python -m venv test_env
        source test_env/Scripts/activate
        python -m pip install --upgrade pip
        pip install wheelhouse/tesseract*.whl
        pip install pytest pytest-xdist scipy

    - name: smoke test
      run: |
        source test_env/Scripts/activate
        python -c "import tesseract_robotics; print('Version:', tesseract_robotics.__version__)"
        python -c "from tesseract_robotics import tesseract_common, tesseract_geometry, tesseract_scene_graph"
        python -c "from tesseract_robotics import trajopt_ifopt; print('trajopt_ifopt OK')"

    - name: run tests
      run: |
        source test_env/Scripts/activate
        cd tesseract_nanobind
        pytest tests -n auto \
          --ignore=tests/tesseract_time_parameterization \
          --ignore=tests/examples \
          --ignore=tests/tesseract_kinematics \
          --ignore=tests/benchmarks \
          -v --tb=short
