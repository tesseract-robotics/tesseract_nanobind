name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
      - 'src/**/*.py'
      - 'src/**/*.cpp'  # binding source — public API surfaces in docstrings
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
      - 'src/**/*.py'
      - 'src/**/*.cpp'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v4
      with:
        path: ws/src/tesseract_nanobind
        fetch-depth: 0  # setuptools-scm needs tag history for version derivation

    - name: install zsh (build_tesseract_cpp.sh shebang)
      run: sudo apt-get update && sudo apt-get install -y zsh

    - name: setup pixi
      uses: prefix-dev/setup-pixi@v0.8.0
      with:
        manifest-path: ws/src/tesseract_nanobind/pyproject.toml
        cache: true
        environments: py312
        activate-environment: py312

    - name: cache vcs repos
      uses: actions/cache@v4
      with:
        path: |
          ws/src/tesseract
          ws/src/tesseract_planning
        key: docs-vcs-${{ runner.os }}-${{ hashFiles('ws/src/tesseract_nanobind/scripts/build_tesseract_cpp.sh') }}

    - name: cache C++ install
      uses: actions/cache@v4
      with:
        path: ws/install
        key: docs-cppinstall-${{ runner.os }}-${{ hashFiles('ws/src/tesseract_nanobind/scripts/build_tesseract_cpp.sh', 'ws/src/tesseract_nanobind/pyproject.toml') }}

    - name: build + install (provides bindings for mkdocstrings)
      working-directory: ws/src/tesseract_nanobind
      run: pixi run install

    - name: Install docs deps
      working-directory: ws/src/tesseract_nanobind
      run: pixi run pip install -r docs/requirements.txt

    # NOTE: --strict dropped temporarily — nanobind macro-generated stubs leave
    # function signatures as `(*args, **kwargs)` at the Python-introspection
    # layer (the typed signature lives in the docstring's first line), which
    # trips griffe's "param does not appear in function signature" warning for
    # docstrings that have an `Args:` section. The .pyi files do have full
    # signatures; downstream fix is to teach mkdocstrings to prefer .pyi over
    # runtime inspection, or to add `nb::sig("...")` to the bindings.
    - name: Build docs
      working-directory: ws/src/tesseract_nanobind
      run: pixi run mkdocs build

    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
