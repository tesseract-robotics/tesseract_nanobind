name: Build & Test

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # e.g. 0.6.1
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'  # e.g. 0.34.1.0
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12']
        config:
        - os: linux
          arch: x64
          runner: ubuntu-22.04
        - os: macos
          arch: arm64
          runner: macos-14
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v4
      with:
        path: ws/src/tesseract_nanobind
    - name: brew (macOS)
      if: matrix.config.os == 'macos'
      run: |
        brew install automake autoconf libtool
        # Note: libomp comes from pixi (llvm-openmp) to avoid duplicate library crashes
    - name: setup pixi
      uses: prefix-dev/setup-pixi@v0.8.0
      env:
        PIXI_ENV: py${{ matrix.python == '3.9' && '39' || matrix.python == '3.10' && '310' || matrix.python == '3.11' && '311' || '312' }}
      with:
        manifest-path: ws/src/tesseract_nanobind/pyproject.toml
        cache: true
        environments: ${{ env.PIXI_ENV }}
        activate-environment: ${{ env.PIXI_ENV }}
    - name: typecheck
      working-directory: ws/src/tesseract_nanobind
      run: pixi run typecheck
    - name: cache vcs repos
      uses: actions/cache@v4
      with:
        path: |
          ws/src/tesseract
          ws/src/tesseract_planning
          ws/src/trajopt
          ws/src/descartes_light
          ws/src/opw_kinematics
          ws/src/ruckig
        key: vcs-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall') }}
    - name: vcs import
      working-directory: ws/src
      run: vcs import --input tesseract_nanobind/dependencies.rosinstall --skip-existing
    - name: patch upstream missing includes
      working-directory: ws/src
      run: |
        # tesseract_planning 0.34.0 uses std::runtime_error without #include <stdexcept>
        # Works on macOS (transitive include) but fails on Linux GCC
        find tesseract_planning -name '*.h' -path '*/poly/*' | xargs grep -l 'std::runtime_error' | while read f; do
          if ! grep -q '#include <stdexcept>' "$f"; then
            sed -i '/#include <string>/a #include <stdexcept>' "$f"
            echo "  patched: $f"
          fi
        done
    - name: cache colcon build
      uses: actions/cache@v4
      id: colcon-cache
      with:
        path: ws/install
        key: colcon-v11-py${{ matrix.python }}-${{ matrix.config.os }}-${{ matrix.config.arch }}-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall', 'ws/src/tesseract_nanobind/pyproject.toml') }}
    - name: colcon build C++ deps (macOS)
      if: matrix.config.os == 'macos' && steps.colcon-cache.outputs.cache-hit != 'true'
      working-directory: ws
      run: |
        export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        export CMAKE_PREFIX_PATH=$CONDA_PREFIX:$GITHUB_WORKSPACE/ws/install
        export LIBRARY_PATH=$CONDA_PREFIX/lib:$LIBRARY_PATH
        export CMAKE_POLICY_VERSION_MINIMUM=3.5

        colcon build --merge-install \
            --packages-ignore tesseract_python tesseract_examples vhacd qpoases tesseract_nanobind tesseract_viewer_python twc_application twc_motion_planning twc_msgs twc_support \
            --event-handlers console_cohesion+ \
            --cmake-force-configure \
            --cmake-args -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_VISIBILITY_PRESET=default -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DINSTALL_OMPL=OFF -DINSTALL_OMPL_TAG=master -DBUILD_CLOUD_CLIENT=OFF -DBUILD_IPOPT=OFF -DBUILD_SNOPT=OFF \
            -DBUILD_SHARED_LIBS=ON -DTESSERACT_ENABLE_EXAMPLES=OFF -DTESSERACT_BUILD_TRAJOPT_IFOPT=ON \
            -DTESSERACT_ENABLE_TESTING=OFF \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_INSTALL_RPATH=@loader_path \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DQT_HOST_PATH=$CONDA_PREFIX \
            -DOpenMP_CXX_INCLUDE_DIR=$CONDA_PREFIX/include \
            -DOpenMP_C_INCLUDE_DIR=$CONDA_PREFIX/include \
            -DOpenMP_CXX_LIB_NAMES=libomp -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp" \
            -DOpenMP_C_LIB_NAMES=libomp -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp" \
            -DOpenMP_libomp_LIBRARY=$CONDA_PREFIX/lib/libomp.dylib
    - name: colcon build C++ deps (Linux)
      if: matrix.config.os == 'linux' && steps.colcon-cache.outputs.cache-hit != 'true'
      working-directory: ws
      run: |
        export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        export CMAKE_PREFIX_PATH=$CONDA_PREFIX:$GITHUB_WORKSPACE/ws/install
        export LIBRARY_PATH=$CONDA_PREFIX/lib:$LIBRARY_PATH
        export CMAKE_POLICY_VERSION_MINIMUM=3.5

        colcon build --merge-install \
            --packages-ignore tesseract_python tesseract_examples vhacd qpoases tesseract_nanobind tesseract_viewer_python twc_application twc_motion_planning twc_msgs twc_support \
            --event-handlers console_cohesion+ \
            --cmake-force-configure \
            --cmake-args -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_VISIBILITY_PRESET=default -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DINSTALL_OMPL=OFF -DINSTALL_OMPL_TAG=master -DBUILD_CLOUD_CLIENT=OFF -DBUILD_IPOPT=OFF -DBUILD_SNOPT=OFF \
            -DBUILD_SHARED_LIBS=ON -DTESSERACT_ENABLE_EXAMPLES=OFF -DTESSERACT_BUILD_TRAJOPT_IFOPT=ON \
            -DTESSERACT_ENABLE_TESTING=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            '-DCMAKE_INSTALL_RPATH=$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
    - name: build nanobind wheel (macOS)
      if: matrix.config.os == 'macos'
      working-directory: ws/src/tesseract_nanobind
      run: |
        export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        export CMAKE_PREFIX_PATH=$CONDA_PREFIX:$GITHUB_WORKSPACE/ws/install
        pip install delocate setuptools-scm
        CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0" \
          pip wheel . -w dist/ --no-build-isolation
    - name: build nanobind wheel (Linux)
      if: matrix.config.os == 'linux'
      working-directory: ws/src/tesseract_nanobind
      run: |
        export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        export CMAKE_PREFIX_PATH=$CONDA_PREFIX:$GITHUB_WORKSPACE/ws/install
        pip install auditwheel setuptools-scm
        CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5" \
          pip wheel . -w dist/ --no-build-isolation
    - name: delocate (macOS)
      if: matrix.config.os == 'macos'
      working-directory: ws/src/tesseract_nanobind
      run: |
        export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        mkdir -p wheelhouse
        delocate-wheel -w wheelhouse -v dist/*.whl
    - name: bundle plugins (macOS)
      if: matrix.config.os == 'macos'
      working-directory: ws/src/tesseract_nanobind
      run: |
        # Plugin factories are runtime-loaded (dlopen), not caught by delocate
        WHEEL_FILE=$(ls wheelhouse/tesseract*.whl)
        WHEEL_DIR=$(mktemp -d)
        unzip -q "$WHEEL_FILE" -d "$WHEEL_DIR"

        PLUGINS=(
          libtesseract_collision_bullet_factories.dylib
          libtesseract_collision_fcl_factories.dylib
          libtesseract_kinematics_core_factories.dylib
          libtesseract_kinematics_kdl_factories.dylib
          libtesseract_kinematics_opw_factory.dylib
          libtesseract_kinematics_ur_factory.dylib
          libtesseract_task_composer_factories.dylib
          libtesseract_task_composer_planning_factories.dylib
          libtesseract_task_composer_taskflow_factories.dylib
        )

        for plugin in "${PLUGINS[@]}"; do
          if [[ -f "$GITHUB_WORKSPACE/ws/install/lib/$plugin" ]]; then
            cp "$GITHUB_WORKSPACE/ws/install/lib/$plugin" "$WHEEL_DIR/tesseract_robotics/.dylibs/"
            echo "  Added: $plugin"
          fi
        done

        # Fix rpaths in newly added plugins
        export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib
        delocate-path "$WHEEL_DIR/tesseract_robotics/.dylibs" -L "$GITHUB_WORKSPACE/ws/install/lib:$CONDA_PREFIX/lib"

        # Patch task_composer_config YAMLs only (resolved at runtime by __init__.py)
        # Robot YAMLs (tesseract_support) are NOT patched - they use env var plugin paths
        echo "Patching task composer configs..."
        for yaml_file in "$WHEEL_DIR/tesseract_robotics/data/task_composer_config"/*.yaml; do
          if [[ -f "$yaml_file" ]] && grep -q '/usr/local/lib' "$yaml_file"; then
            sed -i '' 's|/usr/local/lib|"@PLUGIN_PATH@"|g' "$yaml_file"
            echo "  Patched: $(basename $yaml_file)"
          fi
        done

        # Repack wheel
        rm "$WHEEL_FILE"
        cd "$WHEEL_DIR"
        zip -rq "$GITHUB_WORKSPACE/ws/src/tesseract_nanobind/wheelhouse/$(basename $WHEEL_FILE)" .
        rm -rf "$WHEEL_DIR"
    - name: bundle plugins into wheel (Linux)
      if: matrix.config.os == 'linux'
      working-directory: ws/src/tesseract_nanobind
      run: |
        # Plugin factories are runtime-loaded (dlopen), not caught by auditwheel
        # Bundle them BEFORE auditwheel so deps get repaired together
        # Put in tesseract_robotics/ (not .libs/) so auditwheel repairs them
        WHEEL_FILE=$(ls dist/tesseract*.whl)
        WHEEL_DIR=$(mktemp -d)
        unzip -q "$WHEEL_FILE" -d "$WHEEL_DIR"

        # Put plugins directly in package dir so auditwheel repairs them
        # (auditwheel doesn't repair .so files in subdirectories properly)
        PLUGINS_DIR="$WHEEL_DIR/tesseract_robotics"

        PLUGINS=(
          libtesseract_collision_bullet_factories.so
          libtesseract_collision_fcl_factories.so
          libtesseract_kinematics_core_factories.so
          libtesseract_kinematics_kdl_factories.so
          libtesseract_kinematics_opw_factory.so
          libtesseract_kinematics_ur_factory.so
          libtesseract_task_composer_factories.so
          libtesseract_task_composer_planning_factories.so
          libtesseract_task_composer_taskflow_factories.so
        )

        for plugin in "${PLUGINS[@]}"; do
          if [[ -f "$GITHUB_WORKSPACE/ws/install/lib/$plugin" ]]; then
            cp "$GITHUB_WORKSPACE/ws/install/lib/$plugin" "$PLUGINS_DIR/"
            echo "  Added: $plugin"
          fi
        done

        # Patch task_composer_config YAMLs (resolved at runtime by __init__.py)
        echo "Patching task composer configs..."
        for yaml_file in "$WHEEL_DIR/tesseract_robotics/data/task_composer_config"/*.yaml; do
          if [[ -f "$yaml_file" ]] && grep -q '/usr/local/lib' "$yaml_file"; then
            sed -i 's|/usr/local/lib|"@PLUGIN_PATH@"|g' "$yaml_file"
            echo "  Patched: $(basename $yaml_file)"
          fi
        done

        # Remove search_paths from robot YAMLs (forces use of env vars set by __init__.py)
        echo "Removing hardcoded search_paths from robot YAMLs..."
        find "$WHEEL_DIR/tesseract_robotics/data/tesseract_support" -name "*.yaml" -type f | while read yaml_file; do
          if grep -q 'search_paths:' "$yaml_file"; then
            # Remove search_paths: line and following lines with - /path
            sed -i '/search_paths:/d; /^[[:space:]]*- \/.*$/d' "$yaml_file"
            echo "  Removed search_paths from: $(basename $yaml_file)"
          fi
        done

        # Repack wheel (auditwheel will repair it next)
        rm "$WHEEL_FILE"
        cd "$WHEEL_DIR"
        echo "Wheel contents before auditwheel:"
        find . -name "*.so" | head -20
        zip -rq "$GITHUB_WORKSPACE/ws/src/tesseract_nanobind/dist/$(basename $WHEEL_FILE)" .
        rm -rf "$WHEEL_DIR"
    - name: bundle deps (Linux)
      if: matrix.config.os == 'linux'
      working-directory: ws/src/tesseract_nanobind
      run: |
        # With $ORIGIN rpath set at build time, just bundle all deps in package root
        # No auditwheel needed - simpler and avoids hash renaming issues
        pip install patchelf

        WHEEL_FILE=$(ls dist/tesseract*.whl)
        WHEEL_DIR=$(mktemp -d)
        unzip -q "$WHEEL_FILE" -d "$WHEEL_DIR"
        PKG_DIR="$WHEEL_DIR/tesseract_robotics"

        echo "Bundling all .so dependencies into package root..."

        # Copy all tesseract libs from ws/install/lib
        echo "Copying tesseract libs..."
        echo "Files in ws/install/lib matching *.so* (for debug):"
        ls -la $GITHUB_WORKSPACE/ws/install/lib/*.so* 2>/dev/null | head -20 || true
        for lib in $GITHUB_WORKSPACE/ws/install/lib/*.so*; do
          if [[ -f "$lib" && ! -L "$lib" ]]; then
            cp "$lib" "$PKG_DIR/"
            echo "  Copied: $(basename $lib)"
          elif [[ -L "$lib" ]]; then
            # Also copy symlink targets
            target=$(readlink -f "$lib")
            if [[ -f "$target" ]]; then
              cp "$target" "$PKG_DIR/$(basename $lib)"
              echo "  Copied (from symlink): $(basename $lib)"
            fi
          fi
        done

        # Find and copy all external deps (from conda, etc)
        echo "Finding and copying external deps..."
        export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$GITHUB_WORKSPACE/ws/install/lib

        # Get all deps of all .so files in package
        deps_file=$(mktemp)
        for so in "$PKG_DIR"/*.so*; do
          if [[ -f "$so" ]]; then
            ldd "$so" 2>/dev/null | grep "=>" | awk '{print $3}' | grep -v "^$" >> "$deps_file" || true
          fi
        done

        # Copy unique deps that aren't system libs
        sort -u "$deps_file" | while read dep; do
          if [[ -f "$dep" && "$dep" != /lib* && "$dep" != /usr/lib* ]]; then
            base=$(basename "$dep")
            if [[ ! -f "$PKG_DIR/$base" ]]; then
              cp "$dep" "$PKG_DIR/"
              echo "  Copied: $base"
            fi
          fi
        done
        rm "$deps_file"

        # Set $ORIGIN rpath on all bundled libs in package root
        echo "Setting rpath on all libs..."
        for lib in "$PKG_DIR"/*.so*; do
          if [[ -f "$lib" && ! -L "$lib" ]]; then
            patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          fi
        done

        # Set $ORIGIN/.. rpath on Python extensions in subdirectories
        # These need to find libs in the parent (package root) directory
        echo "Patching Python extensions in subdirectories..."
        find "$PKG_DIR" -mindepth 2 -name "*.so" -type f | while read ext; do
          patchelf --set-rpath '$ORIGIN/..' "$ext" 2>/dev/null || true
          echo "  Patched: $(basename $ext)"
        done

        # Verify no missing deps
        echo "Checking for missing deps..."
        for so in "$PKG_DIR"/*.so*; do
          if [[ -f "$so" && ! -L "$so" ]]; then
            missing=$(ldd "$so" 2>&1 | grep "not found" || true)
            if [[ -n "$missing" ]]; then
              echo "WARNING: $(basename $so) has missing deps:"
              echo "$missing"
            fi
          fi
        done

        # Repack wheel with updated platform tag
        WHEELHOUSE="$GITHUB_WORKSPACE/ws/src/tesseract_nanobind/wheelhouse"
        mkdir -p "$WHEELHOUSE"
        WHEEL_NAME=$(basename "$WHEEL_FILE" | sed 's/linux_x86_64/manylinux_2_35_x86_64/')
        rm -f "$WHEEL_FILE"
        cd "$WHEEL_DIR"
        zip -rq "$WHEELHOUSE/$WHEEL_NAME" .
        cd -
        rm -rf "$WHEEL_DIR"

        echo "Wheel contents:"
        unzip -l "$WHEELHOUSE/$WHEEL_NAME" | grep "\.so" | wc -l
        echo "shared libraries bundled"
    - name: archive wheels
      uses: actions/upload-artifact@v4
      with:
        name: 'python-${{ matrix.python }}-${{ matrix.config.os }}-${{ matrix.config.arch }}'
        path: ws/src/tesseract_nanobind/wheelhouse/tesseract*.whl
    - name: archive logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: 'build-logs-${{ matrix.config.os }}-${{ matrix.config.arch }}'
        path: "**/*.log"
        retention-days: 2

  build-win:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        shell: cmd
    steps:
    - uses: actions/checkout@v4
      with:
        path: ws/src/tesseract_nanobind

    - name: enable long paths
      shell: pwsh
      run: git config --global core.longpaths true

    - uses: actions/setup-python@v5
      id: setup-python
      with:
        python-version: ${{ matrix.python }}
        architecture: x64

    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: false
        miniforge-version: latest
        activate-environment: osqp-env
        channels: conda-forge
        channel-priority: strict

    - name: conda install osqp
      shell: bash -el {0}
      run: conda install -y osqp

    - name: choco install ninja
      run: choco install ninja -r --no-progress

    - uses: johnwason/vcpkg-action@v7
      with:
        pkgs: >-
          boost-dll boost-program-options boost-serialization boost-filesystem
          boost-stacktrace boost-algorithm boost-format
          tinyxml2 console-bridge assimp urdfdom octomap orocos-kdl pcl
          flann jsoncpp yaml-cpp eigen3 openblas
          fcl ompl taskflow
          bullet3[multithreading,double-precision,rtti]
          ccd[double-precision] gperftools
        triplet: x64-windows-release
        extra-args: --clean-after-build
        token: ${{ github.token }}
        cache-key: win-x64-python-${{ matrix.python }}
        github-binarycache: true

    - name: pip build tools
      run: python -m pip install --upgrade pip delvewheel setuptools-scm vcstool colcon-common-extensions

    - name: cache vcs repos
      uses: actions/cache@v4
      with:
        path: |
          ws/src/tesseract
          ws/src/tesseract_planning
          ws/src/trajopt
          ws/src/descartes_light
          ws/src/opw_kinematics
          ws/src/ifopt
          ws/src/ruckig
          ws/src/boost_plugin_loader
          ws/src/ros_industrial_cmake_boilerplate
        key: vcs-win-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall') }}

    - name: vcs import
      working-directory: ws/src
      run: vcs import --input tesseract_nanobind\dependencies.rosinstall --skip-existing

    - name: patch upstream missing includes
      shell: bash
      working-directory: ws/src
      run: |
        # Same patch as Linux — tesseract_planning 0.34.0 std::runtime_error fix
        find tesseract_planning -name '*.h' -path '*/poly/*' | xargs grep -l 'std::runtime_error' 2>/dev/null | while read f; do
          if ! grep -q '#include <stdexcept>' "$f"; then
            sed -i '/#include <string>/a #include <stdexcept>' "$f"
            echo "  patched: $f"
          fi
        done

    - name: cache colcon build
      uses: actions/cache@v4
      id: colcon-cache
      with:
        path: ws/install
        key: colcon-v1-win-py${{ matrix.python }}-${{ hashFiles('ws/src/tesseract_nanobind/dependencies.rosinstall', 'ws/src/tesseract_nanobind/pyproject.toml') }}

    - name: colcon build C++ deps
      if: steps.colcon-cache.outputs.cache-hit != 'true'
      working-directory: ws
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
        set CXXFLAGS=%CXXFLAGS% -DEIGEN_DONT_ALIGN=1 -DEIGEN_DONT_VECTORIZE=1
        set CONDA_ENV_DIR=%CONDA%\envs\osqp-env
        set CMAKE_PREFIX_PATH=%CONDA_ENV_DIR%\Library;%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-release
        set PATH=%CONDA_ENV_DIR%\Library\bin;%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-release\bin;%PATH%
        set CC=cl
        set CXX=cl
        colcon build --merge-install ^
            --packages-ignore tesseract_python tesseract_examples vhacd qpoases tesseract_nanobind tesseract_viewer_python twc_application twc_motion_planning twc_msgs twc_support ^
            --event-handlers console_cohesion+ ^
            --cmake-force-configure ^
            --cmake-args -GNinja -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_VISIBILITY_PRESET=default -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF ^
            -DINSTALL_OMPL=OFF -DBUILD_CLOUD_CLIENT=OFF -DBUILD_IPOPT=OFF -DBUILD_SNOPT=OFF ^
            -DBUILD_SHARED_LIBS=ON -DTESSERACT_ENABLE_EXAMPLES=OFF -DTESSERACT_BUILD_TRAJOPT_IFOPT=ON ^
            -DTESSERACT_ENABLE_TESTING=OFF ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            -DVCPKG_APPLOCAL_DEPS=OFF
        if %ERRORLEVEL% GEQ 1 exit 1

    - name: build nanobind wheel
      working-directory: ws/src/tesseract_nanobind
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
        set CONDA_ENV_DIR=%CONDA%\envs\osqp-env
        set CMAKE_PREFIX_PATH=%GITHUB_WORKSPACE%\ws\install;%CONDA_ENV_DIR%\Library;%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-release
        set PATH=%GITHUB_WORKSPACE%\ws\install\bin;%CONDA_ENV_DIR%\Library\bin;%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-release\bin;%PATH%
        set CMAKE_ARGS=-DCMAKE_POLICY_VERSION_MINIMUM=3.5
        pip wheel . -w dist\ --no-build-isolation
        if %ERRORLEVEL% GEQ 1 exit 1

    - name: bundle plugins then delvewheel repair
      shell: bash
      working-directory: ws/src/tesseract_nanobind
      run: |
        set -e
        WHEEL_FILE=$(ls dist/tesseract*.whl)
        WHEEL_DIR=$(mktemp -d)
        unzip -q "$WHEEL_FILE" -d "$WHEEL_DIR"
        PKG_DIR="$WHEEL_DIR/tesseract_robotics"

        echo "=== Bundling plugin factory DLLs into package dir ==="
        for plugin in \
          tesseract_collision_bullet_factories \
          tesseract_collision_fcl_factories \
          tesseract_kinematics_core_factories \
          tesseract_kinematics_kdl_factories \
          tesseract_kinematics_opw_factory \
          tesseract_kinematics_ur_factory \
          tesseract_task_composer_factories \
          tesseract_task_composer_planning_factories \
          tesseract_task_composer_taskflow_factories; do
          src="$GITHUB_WORKSPACE/ws/install/bin/${plugin}.dll"
          if [[ -f "$src" ]]; then
            cp "$src" "$PKG_DIR/"
            echo "  Added: ${plugin}.dll"
          else
            echo "  MISSING: ${plugin}.dll (expected at $src)"
          fi
        done

        echo "=== Patching task_composer_config YAMLs ==="
        for yaml_file in "$PKG_DIR/data/task_composer_config"/*.yaml; do
          if [[ -f "$yaml_file" ]] && grep -q '/usr/local/lib' "$yaml_file"; then
            sed -i 's|/usr/local/lib|"@PLUGIN_PATH@"|g' "$yaml_file"
            echo "  Patched: $(basename "$yaml_file")"
          fi
        done

        echo "=== Stripping search_paths from tesseract_support YAMLs ==="
        find "$PKG_DIR/data/tesseract_support" -name "*.yaml" -type f 2>/dev/null | while read yaml_file; do
          if grep -q 'search_paths:' "$yaml_file"; then
            sed -i '/search_paths:/d; /^[[:space:]]*- \/.*$/d' "$yaml_file"
            echo "  Stripped: $(basename "$yaml_file")"
          fi
        done

        # Repack (RECORD will be regenerated by delvewheel in the next step)
        rm "$WHEEL_FILE"
        (cd "$WHEEL_DIR" && zip -rq "$GITHUB_WORKSPACE/ws/src/tesseract_nanobind/$WHEEL_FILE" .)
        rm -rf "$WHEEL_DIR"

        echo "=== delvewheel repair ==="
        mkdir -p wheelhouse
        VCPKG_BIN="$GITHUB_WORKSPACE/vcpkg/installed/x64-windows-release/bin"
        CONDA_BIN="$CONDA/envs/osqp-env/Library/bin"
        INSTALL_BIN="$GITHUB_WORKSPACE/ws/install/bin"
        delvewheel repair -v \
          --add-path "$INSTALL_BIN;$VCPKG_BIN;$CONDA_BIN" \
          -w wheelhouse "$WHEEL_FILE"

        echo "=== Wheel contents ==="
        ls -la wheelhouse/

    - uses: actions/upload-artifact@v4
      with:
        name: python-${{ matrix.python }}-windows-x64
        path: ws/src/tesseract_nanobind/wheelhouse/tesseract*.whl

    - if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows-x64-py${{ matrix.python }}
        path: "**/*.log"
        retention-days: 2

  test-wheel:
    needs: build
    runs-on: ${{ matrix.config.runner }}
    # py3.9 has intermittent GC segfaults with pytest-xdist; don't block CI
    continue-on-error: ${{ matrix.python == '3.9' }}
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.12']
        config:
          - os: linux
            arch: x64
            runner: ubuntu-24.04  # needs glibc 2.39 to match build env
          - os: macos
            arch: arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: tesseract_nanobind
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: python-${{ matrix.python }}-${{ matrix.config.os }}-${{ matrix.config.arch }}
          path: wheelhouse/
      - name: install wheel in virgin env
        run: |
          python -m venv test_env
          source test_env/bin/activate
          pip install wheelhouse/tesseract*.whl
      - name: debug libs
        run: |
          source test_env/bin/activate
          PKG_DIR=$(python -c "import tesseract_robotics; from pathlib import Path; print(Path(tesseract_robotics.__file__).parent)")
          echo "Package dir: $PKG_DIR"
          echo "--- .so files in package (count) ---"
          ls "$PKG_DIR"/*.so* 2>/dev/null | wc -l
          echo "--- Plugin factories ---"
          ls -la "$PKG_DIR"/lib*_factories.so 2>/dev/null | head -5 || echo "No plugin factories"
          echo "--- Kinematics factory rpath ---"
          patchelf --print-rpath "$PKG_DIR/libtesseract_kinematics_kdl_factories.so" 2>/dev/null || echo "No rpath"
          echo "--- Kinematics KDL factory deps ---"
          ldd "$PKG_DIR/libtesseract_kinematics_kdl_factories.so" 2>&1 | head -15
          echo "--- Kinematics OPW factory deps ---"
          ldd "$PKG_DIR/libtesseract_kinematics_opw_factory.so" 2>&1
          echo "--- Missing deps in any lib ---"
          for so in "$PKG_DIR"/*.so*; do
            missing=$(ldd "$so" 2>&1 | grep "not found" || true)
            if [[ -n "$missing" ]]; then
              echo "$(basename $so): $missing"
            fi
          done
          echo "--- End missing deps check ---"
          echo "--- Checking plugin deps ---"
          ldd "$PKG_DIR/libtesseract_collision_bullet_factories.so" 2>&1 | grep "not found" || echo "All deps found"
          echo "--- Checking tesseract_common deps ---"
          ldd "$PKG_DIR/libtesseract_common.so" 2>&1 | grep "not found" || echo "All deps found"
          echo "--- Python extension rpath ---"
          patchelf --print-rpath "$PKG_DIR/tesseract_common/_tesseract_common"*.so 2>/dev/null || readelf -d "$PKG_DIR/tesseract_common/_tesseract_common"*.so | grep RPATH || echo "No rpath found"
          echo "--- Python extension deps ---"
          ldd "$PKG_DIR/tesseract_common/_tesseract_common"*.so 2>&1 | head -10
          echo "--- TESSERACT env vars ---"
          python -c "import os; import tesseract_robotics; print('TESSERACT_KINEMATICS_PLUGIN_DIRECTORIES:', os.environ.get('TESSERACT_KINEMATICS_PLUGIN_DIRECTORIES', 'NOT SET')); print('TESSERACT_SUPPORT_DIR:', os.environ.get('TESSERACT_SUPPORT_DIR', 'NOT SET'))"
      - name: smoke test
        run: |
          source test_env/bin/activate
          python -c "import tesseract_robotics; print('Version:', tesseract_robotics.__version__)"
          python -c "from tesseract_robotics import tesseract_common, tesseract_geometry, tesseract_scene_graph"
      - name: run full tests
        run: |
          source test_env/bin/activate
          pip install pytest pytest-xdist scipy
          cd tesseract_nanobind
          # Skip time_parameterization (requires boost), examples (viewer needs Qt/VTK, kinematics needs plugins), benchmarks (needs pytest-benchmark)
          pytest tests -n auto \
            --ignore=tests/tesseract_time_parameterization \
            --ignore=tests/examples \
            --ignore=tests/tesseract_kinematics \
            --ignore=tests/benchmarks \
            -v --tb=short

  test-wheel-win:
    needs: build-win
    runs-on: windows-2022
    # py3.9 has intermittent GC segfaults with pytest-xdist; don't block CI (matches Linux/macOS policy)
    continue-on-error: ${{ matrix.python == '3.9' }}
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.12']
    defaults:
      run:
        shell: cmd
    steps:
    - uses: actions/checkout@v4
      with:
        path: tesseract_nanobind

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        architecture: x64

    - uses: actions/download-artifact@v4
      with:
        name: python-${{ matrix.python }}-windows-x64
        path: wheelhouse

    - name: install wheel in clean venv
      run: |
        python -m venv test_env
        call test_env\Scripts\activate.bat
        python -m pip install --upgrade pip
        for %%W in (wheelhouse\tesseract*.whl) do python -m pip install %%W
        python -m pip install pytest pytest-xdist scipy

    - name: smoke test
      run: |
        call test_env\Scripts\activate.bat
        python -c "import tesseract_robotics; print('Version:', tesseract_robotics.__version__)"
        python -c "from tesseract_robotics import tesseract_common, tesseract_geometry, tesseract_scene_graph"
        python -c "from tesseract_robotics import trajopt_ifopt; print('trajopt_ifopt OK')"

    - name: debug DLLs on failure
      if: failure()
      shell: bash
      run: |
        source test_env/Scripts/activate
        PKG_DIR=$(python -c "import tesseract_robotics, pathlib; print(pathlib.Path(tesseract_robotics.__file__).parent)")
        echo "=== Package dir ==="
        ls "$PKG_DIR" 2>/dev/null || true
        echo "=== Sibling .libs dir ==="
        ls "$PKG_DIR/../tesseract_robotics.libs" 2>/dev/null || echo "none"
        echo "=== DLLs under site-packages ==="
        find "$PKG_DIR" -name "*.dll" 2>/dev/null | head -30

    - name: run tests
      run: |
        call test_env\Scripts\activate.bat
        cd tesseract_nanobind
        python -m pytest tests -n auto ^
          --ignore=tests\tesseract_time_parameterization ^
          --ignore=tests\examples ^
          --ignore=tests\tesseract_kinematics ^
          --ignore=tests\benchmarks ^
          -v --tb=short

  publish:
    needs: [build, build-win, test-wheel, test-wheel-win]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: python-*
        merge-multiple: true
        path: dist/
    - name: List wheels
      run: ls -la dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
